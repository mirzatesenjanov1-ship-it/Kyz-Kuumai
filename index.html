<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кыз Куумай - Физика & ИИ</title>
    <style>
        body { overflow: hidden; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; color: white; }
        .screen { position: fixed; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('kyz-jygyt.png') center/cover no-repeat; z-index: 200; }
        .btn { width: 85%; max-width: 320px; padding: 15px; margin: 8px; border-radius: 15px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: center; }
        .level-btn { background: #2ecc71; color: white; border-bottom: 4px solid #27ae60; }
        .ai-section { background: #f1c40f !important; color: #000 !important; border-bottom: 4px solid #d4ac0d !important; }
        #game-field { position: relative; width: 100%; height: 100vh; background: #fff; display: none; overflow: hidden; }
        #ui-bottom { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; padding: 15px; box-sizing: border-box; border-top: 3px solid #f1c40f; z-index: 300; }
        input, select { padding: 12px; border-radius: 10px; width: 80%; margin-bottom: 10px; border: 2px solid #f1c40f; }
    </style>
</head>
<body>

    <audio id="menuMusic" loop><source src="music-menu.mp3" type="audio/mpeg"></audio>

    <!-- БАШКЫ ЭКРАН -->
    <div id="start-screen" class="screen" style="display: flex;">
        <img src="kyz-jygyt.png" style="width: 150px; height: 150px; border-radius: 50%; border: 4px solid #f1c40f; margin-bottom: 20px;">
        <h1 style="text-align: center;">КЫЗ КУУМАЙ</h1>
        <button class="btn" style="background: #f1c40f; color: #000;" onclick="initGame()">ОЮНДУ БАШТОО</button>
    </div>

    <!-- ДЕҢГЭЭЛДЕР -->
    <div id="level-screen" class="screen">
        <h2>БӨЛҮМДҮ ТАНДАҢЫЗ</h2>
        <button class="btn level-btn" onclick="if(window.selectLevel) selectLevel(0)">1. МЕХАНИКА</button>
        <button class="btn ai-section" onclick="showAISetup()">🤖 ИИ ТЕСТ ТҮЗҮҮЧҮ</button>
        <button class="btn" style="background: #95a5a6;" onclick="location.reload()">АРТКА</button>
    </div>

    <!-- ИИ ОРНОТУУ -->
    <div id="ai-setup-screen" class="screen">
        <div style="background: rgba(0,0,0,0.8); padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #f1c40f;">
            <h2>🤖 ИИ МЕНЕН ТЕСТ</h2>
            <select id="ai-subject">
                <option value="Физика">Физика</option>
                <option value="Тарых">Тарых</option>
            </select>
            <input type="text" id="ai-topic" placeholder="Теманы жазыңыз">
            <button id="ai-btn" class="btn" style="background: #2ecc71;" onclick="generateAIQuiz()">ТЕСТ ТҮЗҮҮ</button>
            <p id="loading-ai" style="display:none; color: #f1c40f;">Gemini ойлонууда... ⏳</p>
            <button class="btn" style="background: #95a5a6;" onclick="document.getElementById('ai-setup-screen').style.display='none'; document.getElementById('level-screen').style.display='flex';">АРТКА</button>
        </div>
    </div>

    <div id="game-field"></div>
    <div id="ui-bottom">
        <div id="q-text"></div>
        <div id="options"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // 1. Негизги функциялар
        function initGame() {
            console.log("Оюн башталды!");
            document.getElementById('start-screen').style.display = "none";
            document.getElementById('level-screen').style.display = "flex";
            const music = document.getElementById('menuMusic');
            if(music) music.play().catch(e => console.log("Music blocked"));
        }

        function showAISetup() {
            document.getElementById('level-screen').style.display = "none";
            document.getElementById('ai-setup-screen').style.display = "flex";
        }

        // 2. ИИ Логикасы (SyntaxError болбошу үчүн RegExp жок кылынды)
        const PROXY_URL = "https://script.google.com/macros/s/AKfycbxXyOdkOc36ynkbBQYMoMpMh49E6f4BKkMQlRD8vmXVtrhoQWaJamVp3LBk9eAbfmYf/exec";

        async function generateAIQuiz() {
            const topic = document.getElementById('ai-topic').value;
            if (!topic) { alert("Теманы жазыңыз!"); return; }

            document.getElementById('loading-ai').style.display = "block";
            const prompt = "Кыргыз тилинде тестти так ушул JSON форматында бер: [{\"q\": \"Суроо?\", \"o\": [\"Жооп1\", \"Жооп2\", \"Жооп3\", \"Жооп4\"], \"a\": 0}] Тема: " + topic;

            try {
                const res = await fetch(PROXY_URL, { method: 'POST', body: JSON.stringify({ prompt: prompt }) });
                const data = await res.json();
                let txt = data.candidates[0].content.parts[0].text;
                
                // Текстти тазалоонун эң коопсуз жолу
                txt = txt.split("```json").join("").split("```").join("").trim();
                window.questions = JSON.parse(txt);

                document.getElementById('ai-setup-screen').style.display = "none";
                document.getElementById('game-field').style.display = "block";
                document.getElementById('ui-bottom').style.display = "flex";

                if (window.startGameLogic) window.startGameLogic();
            } catch (e) {
                console.error(e);
                alert("ИИ ката берди, кайра аракет кылыңыз.");
                document.getElementById('loading-ai').style.display = "none";
            }
        }
    </script>
    <script src="game-logic.js"></script>
</body>
</html>
