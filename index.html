<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кыз Куумай - Физика & ИИ</title>
    <style>
        /* НЕГИЗГИ СТИЛДЕР */
        body { overflow: hidden; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; }
        
        .screen { 
            position: fixed; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; 
            justify-content: center; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('kyz-jygyt.png') center/cover no-repeat; 
            z-index: 200;
        }

        .level-container {
            width: 100%; max-height: 70vh; overflow-y: auto; 
            display: flex; flex-direction: column; align-items: center;
            padding: 10px 0;
        }

        .btn { 
            width: 85%; max-width: 320px; padding: 15px; margin: 8px; 
            border-radius: 15px; border: none; font-size: 16px; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: center;
        }

        .level-btn { background: #2ecc71; color: white; border-bottom: 4px solid #27ae60; }
        .level-btn:active { transform: translateY(2px); border-bottom: 2px solid #27ae60; }

        .ai-section {
            background: #f1c40f !important;
            color: #000 !important;
            border-bottom: 4px solid #d4ac0d !important;
            margin-top: 15px !important;
        }

        #game-field { position: relative; width: 100%; height: 100vh; background: #ffffff; display: none; overflow: hidden; }
        
        .horse-container { 
            position: absolute; 
            bottom: 45%; 
            transition: left 0.6s cubic-bezier(0.25, 0.1, 0.25, 1); 
            width: 150px; 
        }
        .horse-container video { width: 100%; height: auto; border-radius: 10px; }
        
        #ui-bottom { 
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(0,0,0,0.9); display: none; 
            flex-direction: column; padding: 15px; box-sizing: border-box;
            border-top: 3px solid #f1c40f;
            z-index: 300;
        }
        
        #q-text { color: white; text-align: center; font-size: 18px; margin-bottom: 15px; min-height: 50px; }
        #options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .opt-btn { background: #3498db; color: white; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }

        #loading-ai { display: none; color: #f1c40f; font-weight: bold; margin-top: 10px; text-shadow: 1px 1px 2px #000; }

        input[type="text"], input[type="number"], select {
            border: 2px solid #f1c40f;
            outline: none;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body id="game-body">

    <audio id="menuMusic" loop preload="auto">
        <source src="music-menu.mp3" type="audio/mpeg">
    </audio>

    <audio id="gameMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- Баштапкы экран -->
    <div id="start-screen" class="screen" style="display: flex;">
        <img src="kyz-jygyt.png" style="width: 200px; height: 200px; object-fit: cover; border-radius: 50%; border: 5px solid #f1c40f; margin-bottom: 20px;">
        <h1 style="color: white; text-align: center; text-shadow: 2px 2px 10px #000; margin: 0 10px 20px 10px;">КЫЗ КУУМАЙ: БИЛИМ ЖАРЫШЫ</h1>
        <button class="btn" style="background: #f1c40f; color: #000; font-size: 20px;" onclick="initGame()">ОЮНДУ БАШТОО</button>
    </div>

    <!-- Деңгээл тандоо -->
    <div id="level-screen" class="screen">
        <h2 style="color: #f1c40f; text-shadow: 2px 2px 5px #000;">БӨЛҮМДҮ ТАНДАҢЫЗ</h2>
        <div class="level-container">
            <button class="btn level-btn" onclick="selectLevel(0)">1. МЕХАНИКА</button>
            <button class="btn level-btn" onclick="selectLevel(1)">2. МОЛЕКУЛАЛЫК ФИЗИКА</button>
            <button class="btn level-btn" onclick="selectLevel(2)">3. ЭЛЕКТРОДИНАМИКА</button>
            <button class="btn level-btn" onclick="selectLevel(3)">4. ТЕРМЕЛҮҮЛӨР</button>
            <button class="btn level-btn" onclick="selectLevel(4)">5. ОПТИКА</button>
            <button class="btn level-btn" onclick="selectLevel(5)">6. АТОМДУК ФИЗИКА</button>
            <button class="btn level-btn" onclick="selectLevel(6)">7. АСТРОНОМИЯ</button>
            <button class="btn ai-section" onclick="showAISetup()">🤖 ИИ ТЕСТ ТҮЗҮҮЧҮ (GEMINI)</button>
        </div>
    </div>

    <!-- ИИ Орнотуулары -->
    <div id="ai-setup-screen" class="screen">
        <div style="background: rgba(0,0,0,0.7); padding: 25px; border-radius: 20px; backdrop-filter: blur(10px); width: 85%; max-width: 350px; text-align: center; border: 1px solid #f1c40f;">
            <h2 style="color: #f1c40f; margin-bottom: 20px;">🤖 ИИ МЕНЕН ТЕСТ</h2>
            <select id="ai-subject" class="btn" style="background: white; color: black;">
                <option value="Физика">Физика</option>
                <option value="Кыргызстан тарыхы">Кыргызстан тарыхы</option>
                <option value="Биология">Биология</option>
                <option value="Математика">Математика</option>
                <option value="География">География</option>
            </select>
            <input type="text" id="ai-topic" placeholder="Теманы жазыңыз (мис: Манас)" class="btn" style="background: white; color: black;">
            <button id="ai-generate-btn" class="btn" style="background: #2ecc71; color: white;" onclick="generateAIQuiz()">Тест түзүү жана баштоо</button>
            <div id="loading-ai">Gemini суроолорду түзүүдө... ⏳</div>
            <button class="btn" style="background: #95a5a6; color: white;" onclick="location.reload()">Артка</button>
        </div>
    </div>

    <!-- API Ачкыч суроо терезеси -->
    <div id="api-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:30000; justify-content:center; align-items:center; color: black;">
        <div style="background:white; padding:30px; border-radius:20px; max-width:400px; width:90%; text-align:center;">
            <h2 style="color:#2c3e50;">API АЧКЫЧ КЕРЕК</h2>
            <p>GitHub коопсуздугу үчүн ачкычты бул жерге өзүңүз киргизишиңиз керек.</p>
            <input type="text" id="api-input" placeholder="AIzaSy..." style="width:100%; padding:12px; margin-bottom:20px; border:2px solid #ddd; border-radius:8px;">
            <div style="display:flex; gap:10px;">
                <button onclick="saveApiKeyAndStart()" style="flex:1; padding:12px; background:#27ae60; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">САКТОО</button>
                <button onclick="document.getElementById('api-modal').style.display='none'" style="flex:1; padding:12px; background:#e74c3c; color:white; border:none; border-radius:8px; cursor:pointer;">ЖАБУУ</button>
            </div>
        </div>
    </div>

    <!-- Оюн талаасы -->
    <div id="game-field">
        <div id="boy-container" class="horse-container" style="left: 5%;">
            <video id="boyVideo" loop muted playsinline><source src="boy_run.mp4" type="video/mp4"></video>
        </div>
        <div id="girl-container" class="horse-container" style="left: 45%;">
            <video id="girlVideo" loop muted playsinline><source src="girl_run.mp4" type="video/mp4"></video>
        </div>
    </div>

    <!-- Суроолор UI -->
    <div id="ui-bottom">
        <div id="q-text">Суроо жүктөлүүдө...</div>
        <div id="options"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script>
        const firebaseConfig = { databaseURL: "https://kyz-kuumay-game-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);

        // GitHub коопсуздугу үчүн бош калтырылды
        const DEFAULT_API_KEY = ""; 

        function saveApiKeyAndStart() {
            const inputKey = document.getElementById('api-input').value.trim();
            if(inputKey) {
                localStorage.setItem('gemini_api_key', inputKey);
                document.getElementById('api-modal').style.display = 'none';
                generateAIQuiz();
            }
        }

        function initGame() {
            document.getElementById('menuMusic').play().catch(e => console.log("Music error"));
            document.getElementById('start-screen').style.display = "none";
            document.getElementById('level-screen').style.display = "flex";
        }

        function showAISetup() {
            document.getElementById('level-screen').style.display = "none";
            document.getElementById('ai-setup-screen').style.display = "flex";
        }

        async function generateAIQuiz() {
            const topic = document.getElementById('ai-topic').value;
            const subject = document.getElementById('ai-subject').value;
            const currentKey = localStorage.getItem('gemini_api_key') || DEFAULT_API_KEY;

            if (!currentKey || currentKey === "") {
                document.getElementById('api-modal').style.display = "flex";
                return;
            }

            if (!topic) { alert("Сураныч, теманы жазыңыз!"); return; }

            document.getElementById('loading-ai').style.display = "block";
            document.getElementById('ai-generate-btn').disabled = true;
            
            await startAiQuiz(currentKey, subject, topic);
        }

        async function startAiQuiz(apiKey, subject, topic) {
            const prompt = `Кыргыз тилинде ${subject} предметинин "${topic}" темасы боюнча 10 суроодон турган тестти так ушул JSON форматында бер: [{"q": "Суроо?", "o": ["Туура жооп", "Ката 1", "Ката 2", "Ката 3"], "a": 0}]`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                let rawText = data.candidates[0].content.parts[0].text;
                let cleanJson = rawText.replace(/```json|```/g, "").trim();
                window.questions = JSON.parse(cleanJson); 

                document.getElementById('loading-ai').style.display = "none";
                document.getElementById('ai-setup-screen').style.display = "none";
                document.getElementById('game-field').style.display = "block";
                document.getElementById('ui-bottom').style.display = "flex";
                
                if (typeof startGameLogic === "function") startGameLogic();

            } catch (error) {
                console.error("Gemini Error:", error);
                document.getElementById('loading-ai').style.display = "none";
                document.getElementById('ai-generate-btn').disabled = false;
                document.getElementById('api-modal').style.display = "flex";
                alert("API ачкыч ката же иштебейт!");
            }
        }
    </script>
    <script src="game-logic.js"></script>
</body>
</html>
